name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - elixir: "1.19"
            otp: "27"
          - elixir: "1.19"
            otp: "28"
          - elixir: "1.20"
            otp: "28"

    env:
      MIX_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.lock') }}

      - run: mix deps.get
      - run: mix compile --warnings-as-errors
      - run: mix test

  quality:
    runs-on: ubuntu-latest
    env:
      MIX_ENV: dev

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "27"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-dev-${{ hashFiles('mix.lock') }}

      - run: mix deps.get
      - run: mix format --check-formatted
      - run: mix credo --strict

      - name: Cache PLT
        uses: actions/cache@v4
        with:
          path: priv/plts
          key: ${{ runner.os }}-plt-${{ hashFiles('mix.lock') }}

      - run: mix dialyzer

  codegen-verify:
    runs-on: ubuntu-latest
    env:
      MIX_ENV: dev

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "27"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-codegen-${{ hashFiles('mix.lock') }}

      - run: mix deps.get

      - name: Codegen determinism check
        run: |
          mix twilio.generate --clean
          find lib/twilio/api lib/twilio/messaging lib/twilio/resources -name "*.ex" -exec shasum {} \; | sort > /tmp/first_run.txt
          mix twilio.generate --clean
          find lib/twilio/api lib/twilio/messaging lib/twilio/resources -name "*.ex" -exec shasum {} \; | sort > /tmp/second_run.txt
          diff /tmp/first_run.txt /tmp/second_run.txt

      - run: mix compile --warnings-as-errors
