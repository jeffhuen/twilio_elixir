name: Sync Twilio OpenAPI Specs

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "27"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}

      - run: mix deps.get

      - name: Get current spec version
        id: current
        run: |
          if [ -f OPENAPI_VERSION ]; then
            echo "version=$(cat OPENAPI_VERSION)" >> $GITHUB_OUTPUT
          else
            echo "version=none" >> $GITHUB_OUTPUT
          fi

      - name: Sync OpenAPI specs
        run: bash scripts/sync_openapi.sh

      - name: Get new spec version
        id: new
        run: echo "version=$(cat OPENAPI_VERSION)" >> $GITHUB_OUTPUT

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Regenerate SDK
        if: steps.diff.outputs.changed == 'true'
        run: mix twilio.generate --clean --stats

      - name: Run tests
        if: steps.diff.outputs.changed == 'true'
        run: mix test
        env:
          MIX_ENV: test

      - name: Format code
        if: steps.diff.outputs.changed == 'true'
        run: mix format

      - name: Analyze changes
        if: steps.diff.outputs.changed == 'true'
        id: analysis
        run: |
          echo "## Twilio OpenAPI Spec Update" > /tmp/pr_body.md
          echo "" >> /tmp/pr_body.md
          echo "Updated from \`${{ steps.current.outputs.version }}\` to \`${{ steps.new.outputs.version }}\`" >> /tmp/pr_body.md
          echo "" >> /tmp/pr_body.md

          SPECS_MODIFIED=$(git diff --name-only priv/openapi/ | wc -l | tr -d ' ')
          SERVICES_ADDED=$(git diff --diff-filter=A --name-only lib/twilio/ | grep -c "_service.ex$" || true)
          SERVICES_MODIFIED=$(git diff --diff-filter=M --name-only lib/twilio/ | grep -c "_service.ex$" || true)
          RESOURCES_ADDED=$(git diff --diff-filter=A --name-only lib/twilio/resources/ | wc -l | tr -d ' ')
          RESOURCES_MODIFIED=$(git diff --diff-filter=M --name-only lib/twilio/resources/ | wc -l | tr -d ' ')

          echo "### Changes" >> /tmp/pr_body.md
          echo "- Spec files modified: ${SPECS_MODIFIED}" >> /tmp/pr_body.md
          echo "- Services: +${SERVICES_ADDED} new, ${SERVICES_MODIFIED} modified" >> /tmp/pr_body.md
          echo "- Resources: +${RESOURCES_ADDED} new, ${RESOURCES_MODIFIED} modified" >> /tmp/pr_body.md
          echo "" >> /tmp/pr_body.md

          if [ "$SERVICES_ADDED" -gt 0 ]; then
            echo "### New Services" >> /tmp/pr_body.md
            git diff --diff-filter=A --name-only lib/twilio/ | grep "_service.ex$" | while read f; do
              echo "- \`$(basename $f .ex)\`" >> /tmp/pr_body.md
            done
            echo "" >> /tmp/pr_body.md
          fi

          echo "---" >> /tmp/pr_body.md
          echo "_Auto-generated by [sync_openapi workflow](/.github/workflows/sync_openapi.yml)_" >> /tmp/pr_body.md

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update Twilio OpenAPI specs to ${{ steps.new.outputs.version }}"
          title: "chore: Update Twilio OpenAPI specs ${{ steps.current.outputs.version }} -> ${{ steps.new.outputs.version }}"
          body-path: /tmp/pr_body.md
          branch: auto/sync-openapi
          labels: dependencies,automated
          delete-branch: true
